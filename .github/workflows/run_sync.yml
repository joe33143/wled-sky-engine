name: WLED Sky Engine Sync

on:
  push:
    branches:
      - main
  schedule:
    # Runs automatically every 15 minutes to keep your WLED colors synced with the sun
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub Actions tab

jobs:
  sync-sky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz suncalc paho-mqtt

      - name: Run Sky Processor
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python sky_processor.py
