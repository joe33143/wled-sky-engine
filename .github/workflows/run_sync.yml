name: WLED Sky Engine Sync

on:
  push:
    branches:
      - main
  schedule:
    # Runs automatically every 5 minutes to keep your WLED colors synced with the sun
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub Actions tab

jobs:
  sync-sky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz suncalc paho-mqtt

      - name: Run Sky Processor
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          # 1. FORCE EXTRACT: Write out the clean script to disk
          cat << 'EOF' > sky_processor.py
          import os
          import math
          import requests
          import json
          from datetime import datetime
          import pytz
          from suncalc import get_position
          import paho.mqtt.client as mqtt

          WEATHER_API_KEY = os.getenv("OPENWEATHER_API_KEY")
          MQTT_BROKER = "://hivemq.com"
          MQTT_PORT = 1883
          MQTT_TOPIC = "joe33143/wled-sky/api"
          LAT = 25.3176                     
          LON = 83.0062                     

          def get_weather_metrics():
              url = f"http://openweathermap.org{LAT}&lon={LON}&appid={WEATHER_API_KEY}"
              clouds = 0
              try:
                  res = requests.get(url, timeout=5).json()
                  clouds = res.get('clouds', {}).get('all', 0)
                  print(f"Weather metrics synced -> Real-time Clouds: {clouds}%")
              except Exception as e:
                  print(f"Weather API fetch failed: {e}")
              return clouds

          def calculate_moon_phase():
              now = datetime.now(pytz.utc)
              base_new_moon = datetime(2000, 1, 6, 18, 14, tzinfo=pytz.utc)
              diff = now - base_new_moon
              synodic_month = 29.530588853
              phase_days = diff.total_seconds() / 86400.0 % synodic_month
              normalized_phase = phase_days / synodic_month
              if normalized_phase <= 0.5:
                  illumination = normalized_phase * 2.0
              else:
                  illumination = (1.0 - normalized_phase) * 2.0
              return illumination

          def calculate_sky_state(clouds):
              now = datetime.now(pytz.utc)
              pos = get_position(now, LON, LAT)
              altitude_deg = math.degrees(pos['altitude'])
              
              if altitude_deg <= -6:
                  moon_factor = calculate_moon_phase()
                  print(f"Night state active -> Calculated Moon Illumination: {moon_factor:.2f}")
                  if moon_factor < 0.15:
                      return "TRIGGER_NIGHT_PRESET", 255
                  if clouds > 30:
                      moon_factor *= (1.0 - ((clouds - 30) / 70.0) * 0.5)
                  r = int(5 + (moon_factor * 25))
                  g = int(10 + (moon_factor * 30))
                  b = int(25 + (moon_factor * 45))
                  night_bri = int(40 + (moon_factor * 60))
                  return [r, g, b], night_bri
                      
              if altitude_deg > 12:
                  r, g, b = 255, 242, 195
                  if clouds > 25:
                      f = (clouds - 25) / 75.0
                      r = int(r * (1.0 - (f * 0.25)))
                      g = int(g * (1.0 - (f * 0.20)))
                      b = int(b * (1.0 - (f * 0.10)))
                  return [max(0, min(255, x)) for x in (r, g, b)], 255
              else:
                  factor = (altitude_deg + 6) / 18.0  
                  r = 255
                  g = int(80 + (factor * 110))
                  b = int(20 + (factor * 40))
                  if clouds > 50:
                      r, g, b = int(r * 0.7), int(g * 0.6), int(b * 0.6)
                  return [max(0, min(255, x)) for x in (r, g, b)], 200

          def main():
              if not WEATHER_API_KEY:
                  print("Error: Missing OpenWeather API Key.")
                  return

              clouds = get_weather_metrics()
              target_color, master_brightness = calculate_sky_state(clouds)
              
              if target_color == "TRIGGER_NIGHT_PRESET":
                  print("Low-light night reached. Reading dark_night_preset.json layout...")
                  try:
                      with open("dark_night_preset.json", "r") as f:
                          wled_payload = json.load(f)
                      print("Successfully compiled payload from dark_night_preset.json")
                  except Exception as e:
                      print(f"Failed to parse dark_night_preset.json. Applying safe dim fallback... Error: {e}")
                      wled_payload = {
                          "on": True, 
                          "bri": 30, 
                          "seg": [{"id": 1, "start": 0, "stop": 90, "col": []}]
                      }
              else:
                  wled_payload = {
                      "on": True,
                      "bri": master_brightness,
                      "seg": [{
                          "id": 1,
                          "start": 0,
                          "stop": 90,
                          "col": [target_color] 
                      }]
                  }

              try:
                  client = mqtt.Client(mqtt.CallbackAPIVersion.VERSION2, "VaranasiSky_Publisher_Public")
              except AttributeError:
                  client = mqtt.Client("VaranasiSky_Publisher_Public")
              
              try:
                  client.connect(MQTT_BROKER, MQTT_PORT, 60)
                  client.loop_start()
                  print(f"Sending payload to WLED: {wled_payload}")
                  client.publish(MQTT_TOPIC, json.dumps(wled_payload), qos=1).wait_for_publish() 
                  client.loop_stop()
                  client.disconnect()
                  print("Data successfully synced.")
              except Exception as e:
                  print(f"MQTT dispatch failed: {e}")

          if __name__ == "__main__":
              main()
          EOF
          
          # 2. HARD OVERWRITE SAFETY NET: Wipes out the persistent cached broken strings on disk if they exist
          sed -i 's|http://openweathermap.org{LAT}|http://openweathermap.org25.3176\&lon=83.0062\&appid='"$OPENWEATHER_API_KEY"'|g' sky_processor.py
          sed -i 's|openweathermap.org25.3176\&lon=83.0062|api.openweathermap.org/data/2.5/weather?lat=25.3176\&lon=83.0062|g' sky_processor.py
          sed -i 's|://hivemq.com|://hivemq.com|g' sky_processor.py
          
          # 3. RUN CLEAN ENGINE
          python sky_processor.py
