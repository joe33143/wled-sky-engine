- name: Run Sky Processor
  env:
    OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
    MQTT_BROKER: "broker.hivemq.com" 
  run: |
    # Forcefully patch the broken URL string directly inside the runner before it executes
    sed -i 's|http://openweathermap.org{LAT}|http://openweathermap.org{LAT}|g' sky_processor.py
    sed -i 's|://hivemq.com|broker.hivemq.com|g' sky_processor.py
    python sky_processor.py
