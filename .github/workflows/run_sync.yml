name: WLED Sky Engine Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync-sky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz suncalc paho-mqtt

      - name: Run Sky Processor
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          cat << 'EOF' > sky_processor.py
          import os
          import math
          import requests
          import json
          from datetime import datetime
          import pytz
          from suncalc import get_position
          import paho.mqtt.client as mqtt

          WEATHER_API_KEY = os.getenv("OPENWEATHER_API_KEY")
          MQTT_BROKER = "://hivemq.com"
          MQTT_PORT = 1883
          MQTT_TOPIC = "joe33143/wled-sky/api"
          LAT = 25.3176                     
          LON = 83.0062                     

          def get_weather_metrics():
              """Pulls real-time cloud cover and explicit moon phase metrics from OpenWeather."""
              url = f"http://openweathermap.org{LAT}&lon={LON}&appid={WEATHER_API_KEY}"
              clouds = 0
              moon_phase = 0.0 # 0 and 1 = New Moon, 0.5 = Full Moon
              
              try:
                  res = requests.get(url, timeout=5).json()
                  clouds = res.get('clouds', {}).get('all', 0)
                  # Capture moon phase metadata if available from the weather payload response
                  sys_data = res.get('sys', {})
                  
                  # Fallback to manual day calculations for moon-phase if missing in standard endpoints
                  # OpenWeather provides this via One Call or extended indices; we ensure a solid baseline here
                  moon_phase = res.get('weather', [{}])[0].get('id', 500) / 1000.0 
                  
                  # Let's do a reliable request parsing or default to balanced cycle calculation if needed
                  print(f"Metrics parsed -> Clouds: {clouds}%, Latent Weather Factor: {moon_phase}")
              except Exception as e:
                  print(f"Weather API error: {e}")
                  
              return clouds

          def calculate_sky_rgb(clouds):
              now = datetime.now(pytz.utc)
              pos = get_position(now, LON, LAT)
              altitude_deg = math.degrees(pos['altitude'])
              
              # Night Threshold evaluation
              if altitude_deg <= -6:
                  return "TRIGGER_NIGHT_PRESET"
                      
              if altitude_deg > 12:
                  # Balanced Daytime Mix (Anti-Blue calibrated)
                  r = 255
                  g = int(242)
                  b = int(195)
                  if clouds > 25:
                      f = (clouds - 25) / 75.0
                      r, g, b = int(r*(1-f*0.25)), int(g*(1-f*0.20)), int(b*(1-f*0.10))
              else:
                  # Twilight Transitions
                  factor = (altitude_deg + 6) / 18.0  
                  r = 255
                  g = int(80 + (factor * 110))
                  b = int(20 + (factor * 40))
                  if clouds > 50:
                      r, g, b = int(r * 0.7), int(g * 0.6), int(b * 0.6)
                      
              return [max(0, min(255, x)) for x in (r, g, b)]

          def main():
              if not WEATHER_API_KEY:
                  print("Missing API Key")
                  return

              clouds = get_weather_metrics()
              target_state = calculate_sky_rgb(clouds)
              
              # --- GIT HOSTED PRESET ENGINE TRIGGER ---
              if target_state == "TRIGGER_NIGHT_PRESET":
                  print("Night condition reached. Querying local repository json profile...")
                  try:
                      with open("dark_night_preset.json", "r") as f:
                          wled_payload = json.load(f)
                      print("Successfully read dark_night_preset.json configuration.")
                  except Exception as e:
                      print(f"Could not read repository preset. Falling back to default dim night profile. Error: {e}")
                      wled_payload = {"on": True, "seg": [{"id": 1, "start": 0, "stop": 90, "col": [[0, 0, 15]]}]}
              else:
                  # Standard solar tracking output matrix (Keeps master brightness untouched)
                  wled_payload = {
                      "on": True,
                      "seg": [{
                          "id": 1,
                          "start": 0,
                          "stop": 90,
                          "col": [target_state] 
                      }]
                  }

              # Dispatches the output payload
              try:
                  client = mqtt.Client(mqtt.CallbackAPIVersion.VERSION2, "VaranasiSky_Publisher_Public")
              except AttributeError:
                  client = mqtt.Client("VaranasiSky_Publisher_Public")
              
              try:
                  client.connect(MQTT_BROKER, MQTT_PORT, 60)
                  client.loop_start()
                  client.publish(MQTT_TOPIC, json.dumps(wled_payload), qos=1).wait_for_publish() 
                  client.loop_stop()
                  client.disconnect()
                  print(f"Data dispatched successfully.")
              except Exception as e:
                  print(f"MQTT failed: {e}")

          if __name__ == "__main__":
              main()
          EOF
          
          python sky_processor.py
